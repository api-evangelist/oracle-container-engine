      operations:
      - name: listaddons
        method: GET
        description: List add-ons installed on a cluster
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: installaddon
        method: POST
        description: Install a cluster add-on
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
