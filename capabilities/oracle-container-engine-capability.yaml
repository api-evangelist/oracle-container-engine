naftiko: 1.0.0-alpha2
info:
  label: Oracle Container Engine for Kubernetes (OKE) API
  description: Oracle Container Engine for Kubernetes (OKE) is a managed Kubernetes service on Oracle Cloud Infrastructure.
    The API exposes endpoints for managing Kubernetes clusters, node pools, virtual node pools, add-ons, work requests, and
    cluster credentials within OCI compartments.
  tags:
  - Oracle
  - Container
  - Engine
  - API
  created: '2026-05-06'
  modified: '2026-05-06'
capability:
  consumes:
  - type: http
    namespace: oracle-container-engine
    baseUri: https://containerengine.us-ashburn-1.oci.oraclecloud.com/20180222
    description: Oracle Container Engine for Kubernetes (OKE) API HTTP API.
    authentication:
      type: apikey
      in: header
      name: Authorization
      value: '{{ORACLE_CONTAINER_ENGINE_TOKEN}}'
    resources:
    - name: clusters
      path: /clusters
      operations:
      - name: listclusters
        method: GET
        description: List clusters
        inputParameters:
        - name: lifecycleState
          in: query
          type: array
        - name: name
          in: query
          type: string
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createcluster
        method: POST
        description: Create a cluster
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: clusters-clusterid
      path: /clusters/{clusterId}
      operations:
      - name: getcluster
        method: GET
        description: Get a cluster
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: updatecluster
        method: PUT
        description: Update a cluster
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: deletecluster
        method: DELETE
        description: Delete a cluster
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: clusters-clusterid-kubeconfig-content
      path: /clusters/{clusterId}/kubeconfig/content
      operations:
      - name: createkubeconfig
        method: POST
        description: Create kubeconfig content
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: nodepools
      path: /nodePools
      operations:
      - name: listnodepools
        method: GET
        description: List node pools
        inputParameters:
        - name: clusterId
          in: query
          type: string
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createnodepool
        method: POST
        description: Create a node pool
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: nodepools-nodepoolid
      path: /nodePools/{nodePoolId}
      operations:
      - name: getnodepool
        method: GET
        description: Get a node pool
        inputParameters:
        - name: nodePoolId
          in: path
          type: string
          required: true
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: deletenodepool
        method: DELETE
        description: Delete a node pool
